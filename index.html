<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Youtube video downloader</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="theme-toggle" id="theme-toggle"></div>
    <h1>Youtube video downloader</h1>
    <div class="wrapper">
        <div class="domain-icon" id="domain-icon"></div>
        <div class="container">
            <input type="text" id="url" placeholder="Paste link here..." autocomplete="off" />
            <button class="btn-download" id="dl-btn">➔</button>
        </div>
        <div class="unsupported-msg" id="unsupported-msg">These links are not supported</div>
    </div>
    <div class="info-panel" id="info">
        <span id="status-text">Processing download...</span>
        <div class="loader"></div>
    </div>
    <div class="author">Created by dimoncio & Wrethr</div>

    <script src="/script.js"></script>
</body>
</html>
